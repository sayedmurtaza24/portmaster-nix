name: CI
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  no-ai-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Fail if AI artifacts are tracked
        run: |
          set -e
          FORBIDDEN='^(CLAUDE\.md|GEMINI\.md|AGENTS\.md|AI-progress\.json|AI-tasks\.json|\.session-handoff.*\.md|\.claude/|\.gemini/|\.codex/|\.ai-context/|\.cursor/|\.superpowers/|\.planning/|memory/|handoffs/|deferred-work\.jsonl|self-improvements-pending-.*\.jsonl)'
          MATCHES=$(git ls-files | grep -E "$FORBIDDEN" || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Tracked AI artifacts detected. These files must be gitignored, never committed:"
            echo "$MATCHES" | sed 's/^/  - /'
            echo ""
            echo "Fix: git rm --cached <file>, then update .gitignore, then commit."
            exit 1
          fi
          echo "Clean — no AI artifacts tracked."

  check:
    runs-on: ubuntu-latest
    needs: no-ai-files
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25  # v22 (node24)
      # NOTE: magic-nix-cache-action removed 2026-04-16 — DeterminateSystems
      # tied it to FlakeHub auth, which broke CI for individual maintainers
      # without a FlakeHub account. Builds without binary cache are slower
      # but reliable. To re-enable caching: register at flakehub.com OR
      # switch to cachix-action with a personal cache.

      - name: Eval check
        run: nix flake check --no-build

      - name: Format check
        run: nix fmt -- --check .

      - name: Build
        run: |
          # Skip build for module-only repos (no packages output)
          if nix eval .#packages.x86_64-linux.default --apply 'x: true' 2>/dev/null; then
            nix build --print-build-logs
          else
            echo "No default package — skipping build (module-only repo)"
          fi

      - name: Verify
        run: |
          if [ ! -f .github/update.json ]; then exit 0; fi
          if [ ! -L result ] && [ ! -d result ]; then exit 0; fi  # no build output
          BINARY=$(jq -r '.verify.binary // empty' .github/update.json)
          CHECK=$(jq -r '.verify.check // empty' .github/update.json)
          if [ -n "$BINARY" ]; then
            ARGS=$(jq -r '.verify.args // "--version"' .github/update.json)
            echo "Verifying: result/bin/$BINARY $ARGS"
            ./result/bin/"$BINARY" $ARGS
            # ldd check for ELF binaries
            if file ./result/bin/"$BINARY" | grep -q ELF; then
              MISSING=$(ldd ./result/bin/"$BINARY" 2>&1 | grep "not found" || true)
              if [ -n "$MISSING" ]; then
                echo "::error::Missing shared libraries:"
                echo "$MISSING"
                exit 1
              fi
            fi
          elif [ "$CHECK" = "elf" ]; then
            # Scan ALL bins/libs for at least one ELF (find ordering is filesystem-dependent;
            # wrappers + scripts may come first). Pass if any ELF artifact exists.
            FOUND_ELF=""
            while IFS= read -r f; do
              if file "$f" 2>/dev/null | grep -q ELF; then FOUND_ELF="$f"; break; fi
            done < <(find result/bin/ result/lib/ -type f 2>/dev/null)
            if [ -z "$FOUND_ELF" ]; then
              echo "::error::No ELF artifact found under result/bin/ or result/lib/"
              find result/ -type f 2>/dev/null | head -10
              exit 1
            fi
            echo "ELF artifact: $FOUND_ELF"
          elif [ "$CHECK" = "desktop" ]; then
            find result/share/applications/ -name "*.desktop" | head -1 | grep -q . || echo "::warning::No desktop file found"
          elif [ "$CHECK" = "wrapper" ]; then
            FOUND=$(find result/bin/ \( -type f -o -type l \) 2>/dev/null | head -1)
            [ -n "$FOUND" ] && [ -x "$FOUND" ] || { echo "::error::No executable wrapper found"; exit 1; }
          fi
