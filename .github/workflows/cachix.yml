# Canonical Cachix workflow — Nix Packaging Standard.
# Source of truth: <nix-repo>/repo-standard/cachix.yml. Synced into each
# repos/*-nix clone by repo-standard/sync.sh — do not edit per-repo copies.
#
# Opt-in binary cache. Does nothing unless the repo (or the org) defines
# the `CACHIX_CACHE` variable and the `CACHIX_AUTH_TOKEN` secret. When
# configured, it builds `.#default` on a push to the default branch and
# Cachix pushes the resulting closure, so downstream consumers (other CI,
# the nixos config) get binary-cache hits instead of recompiling.
#
# One-time setup (see repo-standard/README.md):
#   1. create a cache at https://app.cachix.org
#   2. repo (or org) variable  CACHIX_CACHE       = <cache-name>
#   3. repo (or org) secret    CACHIX_AUTH_TOKEN  = <write token>
#
# Module-only repos (no `.#default` package) are skipped automatically.
name: Cachix
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check Cachix is configured
        id: cfg
        env:
          CACHIX_CACHE: ${{ vars.CACHIX_CACHE }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [ -z "$CACHIX_CACHE" ]; then
            echo "::notice::CACHIX_CACHE variable not set — Cachix push disabled for this repo"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ -z "$CACHIX_AUTH_TOKEN" ]; then
            echo "::warning::CACHIX_CACHE is set but the CACHIX_AUTH_TOKEN secret is missing — Cachix push disabled"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22 (node24)
        if: steps.cfg.outputs.skip != 'true'

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        if: steps.cfg.outputs.skip != 'true'
        with:
          name: ${{ vars.CACHIX_CACHE }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build and push .#default
        if: steps.cfg.outputs.skip != 'true'
        run: |
          # Module-only repos have no default package — nothing to cache.
          if ! nix eval '.#default.drvPath' >/dev/null 2>&1; then
            echo "::notice::no .#default package (module-only repo) — nothing to cache"
            exit 0
          fi
          # cachix-action installs a post-build hook; paths built here are
          # pushed to the cache automatically.
          nix build .#default --print-build-logs
