# Canonical drift-check workflow — Nix Packaging Standard.
# Source of truth: <nix-repo>/repo-standard/drift-check.yml. Synced into each
# repos/*-nix clone by repo-standard/sync.sh — do not edit per-repo copies.
#
# Fails CI if any synced standard file (scripts/update.sh + the three
# canonical workflows) has drifted from the canonical standard, so a per-repo
# copy can never silently diverge (finding #2). custom-type repos keep a
# bespoke scripts/update.sh and are skipped for that one file only.
name: Drift check
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify synced standard files match the canonical standard
        run: |
          TYPE=$(jq -r '.upstream.type // "none"' .github/update.json 2>/dev/null || echo none)
          BASE="https://raw.githubusercontent.com/Daaboulex/nixos/main/repo-standard"
          # canonical file in repo-standard/  ->  path inside this repo
          declare -A FILES=(
            ["update.sh"]="scripts/update.sh"
            ["update.yml"]=".github/workflows/update.yml"
            ["drift-check.yml"]=".github/workflows/drift-check.yml"
            ["cachix.yml"]=".github/workflows/cachix.yml"
          )
          fail=0
          for canon in "${!FILES[@]}"; do
            dst="${FILES[$canon]}"
            # custom-type repos keep a bespoke scripts/update.sh.
            if [ "$canon" = "update.sh" ] && [ "$TYPE" = "custom" ]; then
              echo "skip   $dst (custom-type repo — bespoke updater)"
              continue
            fi
            if [ ! -f "$dst" ]; then
              echo "::error::$dst is missing — run repo-standard/sync.sh"
              fail=1
              continue
            fi
            if ! curl -sfL "$BASE/$canon" -o "/tmp/canon-$canon"; then
              echo "::error::could not fetch canonical $canon from $BASE"
              fail=1
              continue
            fi
            LOCAL=$(sha256sum "$dst" | cut -d' ' -f1)
            CANON=$(sha256sum "/tmp/canon-$canon" | cut -d' ' -f1)
            if [ "$LOCAL" != "$CANON" ]; then
              echo "::error::$dst has drifted from the canonical standard"
              echo "  local:     $LOCAL"
              echo "  canonical: $CANON"
              fail=1
              continue
            fi
            echo "ok     $dst matches the canonical standard ($LOCAL)"
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::drift detected — re-run repo-standard/sync.sh from the nix repo, then commit"
            exit 1
          fi
